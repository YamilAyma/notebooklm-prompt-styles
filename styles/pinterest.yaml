design_system:
  global_style:
    theme: "Modern, visual-first, and organized. Inspired by Pinterest's discovery aesthetic. Uses card-based layouts with high border radius, soft shadows, and vibrant red accents."
    typography: 
      primary_heading: "Clean rounded sans-serif (e.g., Roboto, Helvetica Rounded), bold"
      secondary_heading: "Simple sans-serif, medium weight, clean"
      body_text: "Functional sans-serif, standard weights, high contrast on white"
    color_palette:
      primary_color: "#E60023" # Pinterest Red
      background: "#FFFFFF"    # Clean White
      text_main: "#111111"     # Carbon / Dark Gray
      accent_color: "#EFEFEF"  # Ultra Light Gray (for card backgrounds)
    key_visual_elements: 
      - "Rounded corners (16px to 24px) for cards and images"
      - "Drop shadows for depth (Pin-style)"
      - "Grid-based image distribution"
      - "Circular profile pictures and 'save' style button call-outs"

  image_generation_prompts:
    style_guidelines: "Clean white studio background, vibrant red accents, rounded corners, drop shadows, flat design elements, high-quality visual discovery vibe, organized grid."
    themes:
      - target: "Abstract Grid"
        prompt_elements: "Minimalist grid of colorful lifestyle photos, rounded corners, white gutters, soft drop shadows, clean white background, vibrant lighting"

slide_layout_templates:
  - type: "Cover_Discovery"
    usage: "Impactful intro slide"
    components:
      - "Layout: Large central image with extremely rounded corners"
      - "Text: Bold title in Pinterest Red centered at the bottom"

  - type: "Card_Grid_Insights"
    usage: "Presenting multiple features or items"
    components:
      - "Layout: 3-column grid of rounded cards"
      - "Components: Each card has a small icon + Bold sub-heading + Short description"

  - type: "Masonry_Vision"
    usage: "Inspiration or mood board"
    components:
      - "Layout: Asymmetrical masonry grid of images"
      - "Overlay: Semi-transparent white labels with dark text"
